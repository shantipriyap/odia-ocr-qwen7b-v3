<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Odia OCR LinkedIn Post Preview</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .container {
            background: #fff;
            width: 660px;
            margin: 40px auto;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 24px 24px 16px 24px;
        }
        .title { font-size: 2em; color: #1a237e; font-weight: bold; margin-bottom: 4px; }
        .subtitle { color: #555; font-size: 1.1em; margin-bottom: 18px; }
        .images {
            display: flex;
            gap: 20px;
            margin-bottom: 18px;
        }
        .imgbox {
            width: 300px;
            height: 300px;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            overflow: hidden;
        }
        .footer {
            color: #1b5e20;
            font-size: 1em;
            margin-top: 10px;
        }
        .brand {
            float: right;
            font-size: 0.9em;
            color: #888;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="title">Odia OCR Breakthrough!</div>
    <div class="subtitle">Fine-tuned Qwen2.5-VL for Odia Text Recognition</div>
    <div class="images">
        <div class="imgbox">
            <img src="inference_samples/sample_01.png" alt="Sample Odia Image" style="max-width:100%; max-height:100%;">
        </div>
        <div class="imgbox" style="background:#fff;">
            <div style="font-size:1.5em; color:#222; text-align:center; padding:20px;">
                ଏହା ହେଉଛି ଓଡ଼ିଆ<br>ଓସିଆର ମଡେଲର<br>ଉତ୍ପାଦନ
            </div>
        </div>
    </div>
    <div class="footer">
        Model: <b>shantipriya/odia-ocr-qwen-finetuned_v2</b> (Hugging Face)
        <span class="brand">#OdiaOCR #AI #HuggingFace #Qwen2_5_VL</span>
    </div>
</div>
</body>
</html>
